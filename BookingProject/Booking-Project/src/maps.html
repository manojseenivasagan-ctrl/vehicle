<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nearby Mechanic Shops</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f4f4;
    }

    header {
        background: #0f2c3c;
        color: white;
        text-align: center;
        padding: 15px;
        font-size: 20px;
    }

    .search-container {
        padding: 10px;
        background: white;
        text-align: center;
        box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    #searchBox {
        width: 60%;
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    #map {
        width: 100%;
        height: 500px;
    }

    @media (max-width: 768px) {
        #searchBox {
            width: 90%;
        }
    }
</style>
</head>
<body>

<header>Nearby Mechanic Shops</header>

<div class="search-container">
    <input id="searchBox" type="text" placeholder="Search area (city, location)">
</div>

<div id="map"></div>

<!-- Google Maps Script -->
<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyANR2rGmCNRqrZL4vWkRX7m1R2B1WoIN-s&libraries=places&callback=initMap"
  async defer>
</script>

<script>
let map;
let service;
let infowindow;

function initMap() {
    const defaultLocation = { lat: 13.0827, lng: 80.2707 }; // Chennai

    map = new google.maps.Map(document.getElementById("map"), {
        center: defaultLocation,
        zoom: 14
    });

    infowindow = new google.maps.InfoWindow();

    // Search box autocomplete
    const input = document.getElementById("searchBox");
    const autocomplete = new google.maps.places.Autocomplete(input);
    autocomplete.bindTo("bounds", map);

    autocomplete.addListener("place_changed", () => {
        const place = autocomplete.getPlace();
        if (!place.geometry) return;

        map.setCenter(place.geometry.location);
        searchMechanics(place.geometry.location);
    });

    // Initial search
    searchMechanics(defaultLocation);
}

function searchMechanics(location) {
    const request = {
        location: location,
        radius: 5000,   // 5 km
        type: ["car_repair"]
    };

    service = new google.maps.places.PlacesService(map);
    service.nearbySearch(request, callback);
}

function callback(results, status) {
    if (status === google.maps.places.PlacesServiceStatus.OK) {
        for (let i = 0; i < results.length; i++) {
            createMarker(results[i]);
        }
    }
}

function createMarker(place) {
    const marker = new google.maps.Marker({
        map: map,
        position: place.geometry.location,
        icon: {
            url: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
        }
    });

    google.maps.event.addListener(marker, "click", () => {
        infowindow.setContent(`
            <strong>${place.name}</strong><br>
            ${place.vicinity || ""}
        `);
        infowindow.open(map, marker);
    });
}
</script>

</body>
</html>
