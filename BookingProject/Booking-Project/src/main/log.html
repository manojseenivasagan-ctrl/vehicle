<script>

document.getElementById("loginForm")
.addEventListener("submit", function(e) {

    e.preventDefault();

    const registernum =
        document.getElementById("registernum")
        .value
        .trim();

    const password =
        document.getElementById("password")
        .value
        .trim();

    const DEMO_USERNAME = "01TN1234";
    const DEMO_PASSWORD = "12345678";

    if (
        registernum === DEMO_USERNAME &&
        password === DEMO_PASSWORD
    ) {

        localStorage.setItem(
            "customerName",
            "Demo User"
        );

        localStorage.setItem(
            "customerregisternum",
            registernum
        );

        alert("Login Successful!");

        window.location.href =
            "vehicleindex.html";

    } else {

        alert(
            "Invalid Login Credentials!\n\n" +
            "Demo Username: 01TN1234\n" +
            "Demo Password: 12345678"
        );

    }

});

</script>
