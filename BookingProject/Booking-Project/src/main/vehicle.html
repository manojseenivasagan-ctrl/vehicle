<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vehicle Details Register</title>
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Header / Navigation */
        header {
            background-color: #2c3e50;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: #1abc9c;
        }

        /* Form container */
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: #e5d4c4;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 26px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 12px;
            font-weight: 600;
            color: #34495e;
        }

        input, select, button {
            padding: 12px 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #1abc9c;
            box-shadow: 0 0 5px rgba(26, 188, 156, 0.3);
        }

        button {
            background-color: #1abc9c;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border: none;
            margin-top: 25px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #16a085;
        }

        .extra-links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .extra-links a {
            color: #1abc9c;
            text-decoration: none;
            font-weight: 500;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }

            .container {
                margin: 20px;
                padding: 30px 20px;
            }

            nav a {
                margin-left: 0;
                margin-right: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- Header / Navigation -->
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="logo_2.png" alt="Vehicle Doctor Logo" style="height:50px;">
            <h1 style="margin:0; font-size:22px;">Vehicle Doctor</h1>
        </div>
        <nav>
        <a href="in.html">Home</a>
        <a href="reg.html">Register</a>
        <a href="ser.html">Services List</a>
        <a href="log.html">Login</a>
        </nav>
    </header>

    <!-- Customer Registration Form -->
    <div class="container">
        <h2>Vehicle Details Register</h2>

        <form id="bookingForm" action="http://localhost:8080/Booking/book" method="post">

            <label for="registernum">Vehicle Register Number:</label>
            <input type="text" id="registernum" name="registernum" placeholder="Enter your Vehicle Register Number" required>

            <label for="owner">Owner Name:</label>
            <input type="text" id="owner" name="owner" placeholder="Enter Owner Name" required>

            <label for="address">Addresss:</label>
            <input type="text" id="address" name="address" placeholder="Enter Address" required>

            <label for="email">Email ID:</label>
            <input type="email" id="email" name="emailId" placeholder="example@mail.com" required>

            <label for="mobileno">Mobile Number:</label>
            <input type="text" id="mobileno" name="mobileno" pattern="[0-9]{10}" placeholder="10-digit number" required>

            <label for="makeandmodel">Vehicle Make and Model:</label>
            <input type="text" id="makeandmodel" name="makeandmodel" placeholder="Enter the vehicle Make and Model Details" required>

            <label for="fueltype">Fuel Type:</label>
            <input type="text" id="fueltype" name="fueltype" placeholder="Enter Fuel Type" required>

            <label for="Chassisno">Chassis No:</label>
            <input type="text" id="Chassisno" name="Chassisno" placeholder="Enter Vehicle Chassis no Details" required>

            <label for="Engineno">Engine No:</label>
            <input type="text" id="Engineno" name="Engineno" placeholder="Enter Vehicle Engine no Details" required>

            <button type="submit">Submit</button>
        </form>
    </div>

<script>

// ✅ AJAX Booking Submit + Redirect UI
document.getElementById("bookingForm").addEventListener("submit", function(event) {
    event.preventDefault(); // Stop normal form redirect

    const formData = new FormData(this);

    fetch("http://localhost:8080/Booking/book", {
        method: "POST",
        body: formData
    })
    .then(response => {
        if (response.ok) {
            alert("✅ Booking Successful! Redirecting...");
            window.location.href = "customerindex.html"; // ✅ Correct redirect
        } else {
            alert("❌ Booking Failed! Try again later.");
        }
    })
    .catch(error => {
        alert("Server Error ❌ Check backend log");
        console.error(error);
    });
});
</script>
</body>
</html>
