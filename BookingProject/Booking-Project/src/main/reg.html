<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vehicle Doctor Customer Register Page</title>
    <style>
        body {
            background-color: #f4f6f9;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Header / Navigation */
         header {
      background: #0f2c3c;
      color: #d9e6ef;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 3px 12px rgba(0,0,0,0.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: #1abc9c;
        }

        /* Slogan / Banner */
        .slogan {
            text-align: center;
            margin: 20px 0;
            font-size: 20px;
            color: #34495e;
        }

        /* Login Form Container */
        .login-container {
            background-color: rgb(229, 215, 171);
            border: 2px solid black;
            border-radius: 10px;
            max-width: 400px;
            margin: 50px auto 80px;
            padding: 30px;
        }

        h2 {
            text-align: center;
            color: rgb(156, 98, 16);
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 12px;
            font-weight: bold;
        }

        input, button {
            padding: 10px;
            margin-top: 6px;
            border-radius: 5px;
            border: 1px solid #aaa;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #1abc9c;
            box-shadow: 0 0 5px rgba(26, 188, 156, 0.3);
        }

        button {
            background-color: #1abc9c;
            color: white;
            font-weight: bold;
            font-size: medium;
            cursor: pointer;
            border: none;
            margin-top: 20px;
            padding: 12px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #16a085;
        }

        .extra-links {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .extra-links a {
            text-decoration: none;
            color: #1abc9c;
            font-weight: bold;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }

            nav a {
                margin-left: 0;
                margin-top: 5px;
            }
        }
    </style>
</head>
<body>

    <!-- Header / Navigation -->
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
    <img src="logo_2.png" alt="Vehicle Doctor Logo" style="height:50px;">
    <h1 style="margin:0; font-size:22px;">Vehicle Doctor</h1>
  </div>
        <nav>
      <a href="index.html">Home</a>
      <a href="reg.html">Register</a>
      <a href="ser.html">Services List</a>
      <a href="log.html">Login</a>
        </nav>
    </header>

    <!-- Slogan / Banner -->
    <div class="slogan">
        <p>Connect with us. Access Your Vehicle Services Instantly.</p>
    </div>

    <!-- Login Form -->
    <div class="login-container">
        <h2>Customer Register</h2>
        <form id="customerregister" action="http://localhost:8080/custs/register" method="post">

            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your Name" required>

            <label for="registernum">Vehicle Register Number:</label>
            <input type="text" id="registernum" name="registernum" placeholder="Enter your Vehicle Register Number" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>

            <button type="submit">Register</button>
        </form>

        <div class="extra-links">
            <p>Already have an account? <a href="log.html">Login here</a></p>
        </div>
    </div>

<script>
document.getElementById("customerregister").addEventListener("submit", function(event) {
    event.preventDefault(); // Stop default redirect

    const formData = new FormData(this);

    fetch("http://localhost:8080/custs/register", {
        method: "POST",
        body: formData
    })
    .then(resp => {
        if (resp.ok) {
            alert("✅ Registration Successful!");
            window.location.href = "log.html"; // ✅ redirect correctly
        } else {
            alert("❌ Registration Failed! Please try again.");
        }
    })
    .catch(err => {
        alert("Server Error ❌ Check backend console");
        console.error(err);
    });
});
</script>


</body>
</html>
