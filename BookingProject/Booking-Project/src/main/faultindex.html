<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
    }

    /* Header */
    header {
        background: #0f2c3c;
        color: #d9e6ef;
        padding: 18px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 3px 12px rgba(0,0,0,0.2);
        position: sticky;
        top: 0;
        z-index: 100;
    }

    header h1 {
        margin: 0;
        font-size: 22px;
    }

    header img {
        height: 50px;
    }

    nav a {
        color: white;
        text-decoration: none;
        margin-left: 20px;
        font-weight: 500;
        transition: 0.3s;
    }

    nav a:hover {
        color: #1abc9c;
    }

    /* Slogan */
    .slogan {
        text-align: center;
        margin: 25px 0;
        font-size: 20px;
        color: #34495e;
        font-weight: bold;
    }

    /* Cards */
    .container {
        display: flex;
        justify-content: center;
        align-items: stretch;
        flex-wrap: wrap;
        gap: 30px;
        padding: 30px;
    }

    .box {
        background-color: rgb(211, 188, 134);
        border: 2px solid black;
        border-radius: 12px;
        width: 320px;
        text-align: center;
        padding: 25px;
        transition: transform 0.3s, box-shadow 0.3s;
    }

    .box:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .box img {
        width: 160px;
        height: 160px;
        object-fit: contain;
        margin-bottom: 15px;
    }

    .box h2 {
        color: rgb(156, 98, 16);
        margin-bottom: 20px;
    }

    .btn-link {
        display: inline-block;
        background-color: #4CAF50;
        color: white;
        padding: 12px 20px;
        font-weight: bold;
        font-size: 15px;
        border-radius: 6px;
        text-decoration: none;
        transition: 0.3s;
    }

    .btn-link:hover {
        background-color: #104212;
    }

    footer {
        margin-top: 40px;
        text-align: center;
        background: #0f2c3c;
        color: white;
        padding: 15px;
    }

    @media (max-width: 768px) {

        header {
            flex-direction: column;
            align-items: flex-start;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            margin-left: 0;
            margin-right: 15px;
        }

        .container {
            flex-direction: column;
            align-items: center;
        }
    }
</style>
```
