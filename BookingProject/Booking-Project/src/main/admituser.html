<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customers Chosen List</title>
  <script type="text/javascript" src="myscript.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f9;
      color: #333;
      padding: 0;
    }

    /* Header */
    header {
      background: #2c3e50;
      color: white;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 22px;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 500;
      transition: 0.3s;
    }
    nav a:hover {
      color: #1abc9c;
    }

    /* Table Section */
    .table-container {
      margin: 50px auto;
      padding: 20px;
      max-width: 95%;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
      background-color: white;
    }

    th, td {
      padding: 12px;
      border: 1px solid #ddd;
    }

    th {
      background-color: #16a085;
      color: white;
      font-weight: bold;
    }

    tr:nth-child(even) td {
      background-color: #f9f9f9;
    }

    tr:hover td {
      background-color: #e8f8f5;
    }

    /* Footer */
    footer {
      background: #2c3e50;
      color: white;
      margin-top: 40px;
    }

    .footer-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 40px;
      max-width: 1200px;
      margin: auto;
    }

    .footer-section h3 {
      margin-bottom: 15px;
      color: #1abc9c;
    }

    .footer-section p, 
    .footer-section a {
      font-size: 14px;
      color: #ddd;
      text-decoration: none;
      line-height: 1.6;
    }

    .footer-section a:hover {
      color: #1abc9c;
    }

    .footer-section ul {
      list-style: none;
      padding: 0;
    }

    .footer-section ul li {
      margin-bottom: 10px;
    }

    .social-icons a {
      font-size: 20px;
      margin-right: 10px;
      color: white;
      transition: 0.3s;
    }

    .social-icons a:hover {
      color: #1abc9c;
    }

    .footer-bottom {
      text-align: center;
      padding: 15px;
      background: #1f2d3d;
      font-size: 14px;
    }

    /* Loading message */
    #loading {
      text-align: center;
      padding: 20px;
      color: #555;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div style="display:flex; align-items:center; gap:10px;">
      <img src="logo1.png" alt="Book Mechanic Logo" style="height:50px;">
      <h1>Book Mechanic</h1>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="register.html">Register</a>
      <a href="serviceindex.html">Services List</a>
      <a href="loginindex.html">Login</a>
    </nav>
  </header>

  <!-- Table -->
  <div class="table-container">
    <h2 style="text-align:center; color:#16a085; margin-bottom:20px;">Users List</h2>
    <table>
      <thead>
        <tr>
          <th>User Name</th>
          <th>User Mail Id</th>
        </tr>
      </thead>
      <tbody id="usersdetails">
        <tr><td colspan="10" id="loading">Loading User Details...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Script -->
  <script type="text/javascript">
    window.onload = function() {
      userslist(); // function from myscript.js
    }
  </script>


</body>
</html>
