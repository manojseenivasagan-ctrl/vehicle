<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register Page - Book Mechanic</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    /* Header / Navigation */
    header {
      background-color: #2c3e50;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 500;
      transition: 0.3s;
    }

    nav a:hover {
      color: #1abc9c;
    }

    /* Welcome text */
    .welcome {
      text-align: center;
      font-size: 22px;
      color: #2c3e50;
      margin-top: 25px;
      font-weight: bold;
    }

    /* Slogan */
    .slogan {
      text-align: center;
      margin: 15px 0 25px 0;
      font-size: 18px;
      color: #34495e;
      font-weight: 500;
    }

    /* Register Boxes */
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      padding: 30px 20px;
      gap: 30px;
    }

    .box {
      background-color: rgb(211, 188, 134);
      border: 2px solid black;
      border-radius: 10px;
      width: 300px;
      text-align: center;
      padding: 30px 20px;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .box:hover {
      transform: translateY(-8px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .box img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    h2 {
      color: rgb(156, 98, 16);
      margin-bottom: 20px;
    }

    .btn-link {
      display: inline-block;
      background-color: #4CAF50;
      color: white;
      padding: 12px 20px;
      font-weight: bold;
      font-size: medium;
      border-radius: 6px;
      text-align: center;
      text-decoration: none;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.3s;
    }

    .btn-link:hover {
      background-color: #104212;
    }

    @media (max-width: 700px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      nav {
        margin-top: 10px;
      }

      nav a {
        display: inline-block;
        margin: 5px 10px 0 0;
      }

      .container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <!-- Header / Navigation -->
  <header>
    <div style="display: flex; align-items: center; gap: 10px;">
      <img src="logo1.png" alt="Book Mechanic Logo" style="height: 50px;">
      <h1>Book Mechanic</h1>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="register.html">Register</a>
      <a href="serviceindex.html">Services List</a>
      <a href="loginindex.html">Login</a>
    </nav>
  </header>

  <!-- Welcome Customer Name -->
  <div class="welcome" id="welcomeText">Welcome, Admin!</div>

  <!-- Slogan -->
  <div class="slogan">
    <p>Book a Mechanic. Maintain Your Vehicle. Drive with Confidence!</p>
  </div>

  <!-- Register Options -->
  <div class="container">
    <!-- Book Mechanic -->
    <div class="box">
      <img src="customer.jpg" alt="Customer Image">
      <h2>Book Mechanic</h2>
      <a href="admituser.html" class="btn-link">View Users List</a>
    </div>

    <!-- Mechanic Details -->
    <div class="box">
      <img src="mechanic.png" alt="Mechanic Image">
      <h2>Mechanic Details</h2>
      <a href="admitshop.html" class="btn-link">View Mechanic List</a>
    </div>

</body>
</html>
