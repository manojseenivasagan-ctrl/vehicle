<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Service Details Update</title>
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Header / Navigation */
        header {
            background-color: #2c3e50;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: #1abc9c;
        }

        /* Form container */
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: #e5d4c4;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 26px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 12px;
            font-weight: 600;
            color: #34495e;
        }

        input, select, button {
            padding: 12px 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #1abc9c;
            box-shadow: 0 0 5px rgba(26, 188, 156, 0.3);
        }

        button {
            background-color: #1abc9c;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border: none;
            margin-top: 25px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #16a085;
        }

        .extra-links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .extra-links a {
            color: #1abc9c;
            text-decoration: none;
            font-weight: 500;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }

            .container {
                margin: 20px;
                padding: 30px 20px;
            }

            nav a {
                margin-left: 0;
                margin-right: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- Header / Navigation -->
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="/logo_2.png" alt="Vehicle Doctor Logo" style="height:50px;">
            <h1 style="margin:0; font-size:22px;">Vehicle Doctor</h1>
        </div>
        <nav>
        <a href="/index.html">Home</a>
        <!--<a href="reg.html">Register</a>-->
        <a href="/ser.html">Services List</a>
        <!--<a href="log.html">Login</a>-->
        </nav>
    </header>

    <!-- Customer Registration Form -->
    <div class="container">
        <h2>Service Details</h2>

        <form id="bookingForm" action="/Vehicle/Service/Register" method="post">

            <label for="registernum">Vehicle Register Number:</label>
            <input type="text" id="registernum" name="registernum" placeholder="Enter your Vehicle Register Number" required>

            <label for="workshop">Workshop Name:</label>
            <input type="text" id="workshop" name="workshop" placeholder="Enter Workshop Name" required>

            <label for="location">Workshop Location:</label>
            <input type="text" id="location" name="location" placeholder="Enter Workshop Location" required>

            <label for="ServiceDate">Service Date:</label>
            <input type="date" id="ServiceDate" name="ServiceDate" required>

            <label for="ServiceType">Service Type:</label>
            <input type="text" id="ServiceType" name="ServiceType" placeholder="Enter Service Type" required>

            <label for="Odometer">Odometer Details:</label>
            <input type="text" id="Odometer" name="Odometer" placeholder="Enter Odometer Details" required>

            <label for="workdone">Major Work Done Details:</label>
            <input type="text" id="workdone" name="workdone" placeholder="Enter Major Work Done Details" required>

            <label for="cost">Cost:</label>
            <input type="text" id="cost" name="cost" placeholder="Enter cost" required>

            <label for="Status">Status:</label>
            <input type="text" id="Status" name="Status" placeholder="Enter Status" required>

            <button type="submit">Update</button>
        </form>
    </div>

<script>

//  AJAX Booking Submit + Redirect UI
document.getElementById("bookingForm").addEventListener("submit", function(event) {
    event.preventDefault(); // Stop normal form redirect

    const formData = new FormData(this);

    fetch("/Vehicle/Service/Register", {
        method: "POST",
        body: formData
    })
    .then(response => {
        if (response.ok) {
            alert("✅ Vehicle Service Details updated Successful! Redirecting...");
            window.location.href = "servicehis.html"; //  Correct redirect
        } else {
            alert("❌ Vehicle Service Details updated Failed! Try again later.");
        }
    })
    .catch(error => {
        alert("Server Error ❌ Check backend log");
        console.error(error);
    });
});
</script>
</body>
</html>
