<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register a Shop</title>
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Header / Navigation */
        header {
            background-color: #2c3e50;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: #1abc9c;
        }

        /* Slogan / Banner */
        .slogan {
            text-align: center;
            margin: 20px 0;
            font-size: 20px;
            color: #34495e;
        }

        /* Form Container */
        .container {
            max-width: 550px;
            margin: 30px auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 12px;
            font-weight: 600;
            color: #34495e;
        }

        input, select, button {
            padding: 12px 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #1abc9c;
            box-shadow: 0 0 5px rgba(26, 188, 156, 0.3);
        }

        button {
            background-color: #1abc9c;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border: none;
            margin-top: 25px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #16a085;
        }

        .extra-links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .extra-links a {
            color: #1abc9c;
            text-decoration: none;
            font-weight: 500;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .container {
                margin: 20px;
                padding: 30px 20px;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
            }

            nav a {
                margin-left: 0;
                margin-top: 5px;
            }
        }
    </style>
</head>
<body>

    <!-- Header / Navigation -->
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
    <img src="/logo1.png" alt="Book Mechanic Logo" style="height:50px;">
    <h1 style="margin:0; font-size:22px;">Book Mechanic</h1>
  </div>
        <nav>
            <a href="/in.html">Home</a>
      <a href="/register.html">Register</a>
      <a href="/serviceindex.html">Services List</a>
      <a href="/loginindex.html">Login</a>
        </nav>
    </header>

    <!-- Slogan -->
    <div class="slogan">
        <p>Register Your Shop. Expand Your Reach. Serve Every Vehicle!</p>
    </div>

    <!-- Shop Registration Form -->
    <div class="container">
        <h1>Register Your Shop</h1>

        <form action="/Mechanic/details" method="post">
            <label for="name">Shop Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your shop name" required>

            <label for="mobileno">Mobile Number:</label>
            <input type="tel" id="mobileno" name="mobileno" pattern="[0-9]{10}" placeholder="10-digit number" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="emailId" placeholder="Enter your email" required>

            <label for="city">City:</label>
            <input type="text" id="city" name="city" placeholder="City" required>

            <label for="address">Address:</label>
            <input type="text" id="address" name="address" placeholder="Full address" required>

            <label for="zipcode">Zip Code:</label>
            <input type="number" id="zipcode" name="zipcode" placeholder="Zip Code" required>

            <label for="count">Employees Count:</label>
            <input type="number" id="count" name="count" min="1" placeholder="Number of employees" required>

            <label for="vehicle">Vehicle Services:</label>
            <select id="vehicle" name="VehicleName" required>
                <option value="">-- Select a Vehicle --</option>
                <option value="Two-Wheeler">Two-Wheeler</option>
                <option value="Three-Wheeler">Three-Wheeler</option>
                <option value="Four-Wheeler">Four-Wheeler</option>
            </select>

            <label for="opentime">Opening Time:</label>
            <input type="time" id="opentime" name="opentime" required>

            <label for="closetime">Closing Time:</label>
            <input type="time" id="closetime" name="closetime" required>

            <button type="submit">Submit</button>
        </form>
    </div>

    <div class="extra-links">
        <p>Already have an account? <a href="/login.html">Login here</a></p>
    </div>

</body>
</html>
