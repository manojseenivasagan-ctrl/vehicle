<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mechanic Booking Service</title>
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Header / Navigation */
        header {
            background-color: #2c3e50;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: #1abc9c;
        }

        /* Form container */
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: #e5d4c4;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 26px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 12px;
            font-weight: 600;
            color: #34495e;
        }

        input, select, button {
            padding: 12px 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #1abc9c;
            box-shadow: 0 0 5px rgba(26, 188, 156, 0.3);
        }

        button {
            background-color: #1abc9c;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border: none;
            margin-top: 25px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #16a085;
        }

        .extra-links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .extra-links a {
            color: #1abc9c;
            text-decoration: none;
            font-weight: 500;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }

            .container {
                margin: 20px;
                padding: 30px 20px;
            }

            nav a {
                margin-left: 0;
                margin-right: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- Header / Navigation -->
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="/logo1.png" alt="Book Mechanic Logo" style="height:50px;">
            <h1 style="margin:0; font-size:22px;">Book Mechanic</h1>
        </div>
        <nav>
        <a href="/cus_index.html">Home</a>
        <!-- <a href="customerreg.html">Register</a>-->
        <a href="/customerservice.html">Services List</a>
        <!-- <a href="login.html">Login</a> -->
        </nav>
    </header>

    <!-- Customer Registration Form -->
    <div class="container">
        <h2>Mechanic Booking</h2>

        <form id="bookingForm" action="/Booking/book" method="post">

            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>

            <label for="mobileno">Mobile Number:</label>
            <input type="text" id="mobileno" name="mobileno" pattern="[0-9]{10}" placeholder="10-digit number" required>

            <label for="email">Email ID:</label>
            <input type="email" id="email" name="emailId" placeholder="example@mail.com" required>

            <label for="city">City:</label>
            <input type="text" id="city" name="city" placeholder="Enter your city" required>

            <label for="address">Address:</label>
            <input type="text" id="address" name="address" placeholder="Enter your address" required>

            <label for="pincode">Pin Code:</label>
            <input type="text" id="pincode" name="pincode" placeholder="Enter your pincode" required>

            <label for="vehicle">Vehicle Type:</label>
            <select id="vehicle" name="VehicleName" required onchange="updateServices()">
                <option value="">-- Select a Vehicle --</option>
                <option value="Two-Wheeler">Two-Wheeler</option>
                <option value="Four-Wheeler">Four-Wheeler</option>
            </select>

            <label for="vehiclemodel">Vehicle Model:</label>
            <input type="text" id="vehiclemodel" name="vehiclemodel" placeholder="Enter vehicle model" required>

            <label for="service">Service:</label> 
            <select id="service" name="servicedetails" required>
                <option value="">-- Select a Service --</option>
            </select>

                <!-- New Booking Date and Time -->
            <label for="bookingdate">Booking Date:</label>
            <input type="date" id="bookingdate" name="servicedate" required>

            <label for="bookingtime">Booking Time:</label>
            <input type="time" id="bookingtime" name="servicetime" required>

            <input type="hidden" id="status" name="status" value="Booked">

            <button type="submit">Book</button>
        </form>
    </div>

<script>
function updateServices() {
    const vehicleType = document.getElementById("vehicle").value;
    const serviceSelect = document.getElementById("service");

    serviceSelect.innerHTML = '<option value="">-- Select a Service --</option>';

    let services = [];

    if (vehicleType === "Four-Wheeler") {
        services = ["Engine Oil and Filter", "Tires", "Brakes", "Lights and Wipers", "Air Filters", "Battery", "Suspension and Steering", "Transmission", "Coolant System", "Engine Components"];
    } else if (vehicleType === "Two-Wheeler") {
        services = ["Engine Oil & Oil Filter", "Air Filter", "Chain", "Brakes", "Tires", "Electrical", "Lubrication", "Suspension"];
    }

    services.forEach(service => {
        let option = document.createElement("option");
        option.value = service;
        option.textContent = service;
        serviceSelect.appendChild(option);
    });
}

//  AJAX Booking Submit + Redirect UI
document.getElementById("bookingForm").addEventListener("submit", function(event) {
    event.preventDefault(); // Stop normal form redirect

    const formData = new FormData(this);

    fetch("/Booking/book", {
        method: "POST",
        body: formData
    })
    .then(response => {
        if (response.ok) {
            alert("✅ Booking Successful! Redirecting...");
            window.location.href = "/customerindex.html"; // ✅ Correct redirect
        } else {
            alert("❌ Booking Failed! Try again later.");
        }
    })
    .catch(error => {
        alert("Server Error ❌ Check backend log");
        console.error(error);
    });
});
</script>



</body>
</html>
