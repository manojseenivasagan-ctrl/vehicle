<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mechanic Details - Book Mechanic</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
    }
    header {
      background-color: #2c3e50;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
    }
    header h1 { margin: 0; font-size: 22px; }
    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 500;
    }
    nav a:hover { color: #1abc9c; }
    #welcome { text-align: center; margin: 20px 0; font-size: 22px; color: #2c3e50; }
    #logoutBtn {
      display: block;
      margin: 0 auto 20px auto;
      padding: 10px 20px;
      background-color: #e74c3c;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .table-container {
      max-width: 95%;
      margin: 20px auto 50px auto;
      background-color: white;
      border-radius: 10px;
      padding: 20px;
      overflow-x: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
    }
    th, td { padding: 12px; border: 1px solid #ddd; }
    th { background-color: #16a085; color: white; }
    tr:nth-child(even) td { background-color: #f9f9f9; }
    tr:hover td { background-color: #e8f8f5; }
    #loading { text-align: center; padding: 20px; color: #555; }
    .feedback-btn {
      background-color: #1abc9c;
      color: white;
      padding: 6px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }
    .feedback-btn:hover { background-color: #16a085; }

    /* Search Bar Style */
    #searchBar {
      width: 98%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:10px;">
    <img src="/logo1.png" alt="Book Mechanic Logo" style="height:50px;">
    <h1>Book Mechanic</h1>
  </div>
  <nav>
    <a href="/cus_index.html">Home</a>
    <a href="/customerreg.html">Register</a>
    <a href="/customerservice.html">Services List</a>
    <a href="/login.html">Login</a>
    <a href="/bookinghistory.html">Feedback History</a>
  </nav>
</header>

<div id="welcome">Welcome, Guest!</div>
<button id="logoutBtn">Logout</button>

<div class="table-container">
  <h2 style="text-align:center; color:#16a085;">Your Mechanic Bookings</h2>

  <!--  Search Bar Added -->
  <input type="text" id="searchBar" onkeyup="searchBookings()" placeholder="Search bookings...">

  <table>
    <thead>
      <tr>
        <th>Customer Name</th>
        <th>Email</th>
        <th>Mobile</th>
        <th>Address</th>
        <th>City</th>
        <th>Vehicle</th>
        <th>Service Details</th>
        <th>Date</th>
        <th>Time</th>
        <th>Shop Name</th>
        <th>Shop Email</th>
        <th>Mechanic Name</th>
        <th>Mechanic Mobile</th>
        <th>Feedback</th>
      </tr>
    </thead>
    <tbody id="confirmedbookingdetails">
      <tr><td colspan="13" id="loading">Loading bookings...</td></tr>
    </tbody>
  </table>
</div>

<script>
//  Run after page loads
window.onload = function() {
  const customerName = localStorage.getItem("customerName") || "Guest";
  const customerEmail = localStorage.getItem("customerEmail");

  document.getElementById("welcome").textContent = `Welcome, ${customerName}!`;

  if (!customerEmail) {
    alert("Please log in first!");
    window.location.href = "/login.html";
    return;
  }

  // Load bookings
  loadNotSubmittedBookings(customerEmail);

  // Logout event
  document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.removeItem("customerName");
    localStorage.removeItem("customerEmail");
    window.location.href = "/login.html";
  });
};

//  Function: Fetch & Show only Not Submitted Bookings
function loadNotSubmittedBookings(email) {
  fetch(`/ConfirmBooking/list/${email}`)
    .then(response => {
      if (!response.ok) {
        throw new Error("Network response was not ok: " + response.statusText);
      }
      return response.json();
    })
    .then(bookings => {
      const dataTable = document.getElementById("confirmedbookingdetails");
      dataTable.innerHTML = "";

      //  Filter only status = "Not Submitted"
      const notSubmitted = bookings.filter(b => b.status === "Not Submitted");

      if (notSubmitted.length === 0) {
        dataTable.innerHTML = `<tr><td colspan="14" style="color:red;">No pending bookings (status: Not Submitted).</td></tr>`;
        return;
      }

      notSubmitted.forEach(b => {
        const row = `
          <tr>
            <td>${b.name || '-'}</td>
            <td>${b.emailId || '-'}</td>
            <td>${b.mobileno || '-'}</td>
            <td>${b.address || '-'}</td>
            <td>${b.city || '-'}</td>
            <td>${b.vehicleName || '-'}</td>
            <td>${b.servicedetails || '-'}</td>
            <td>${b.servicedate || '-'}</td>
            <td>${b.servicetime || '-'}</td>
            <td>${b.shopname || '-'}</td>
            <td>${b.shopemailId || '-'}</td>
            <td>${b.mechanicname || '-'}</td>
            <td>${b.mechanicmobileno || '-'}</td>
            <td><button class="feedback-btn" onclick="gotoFeedback('${b.mechanicname}', '${b.mechanicmobileno}')">Give Feedback</button></td>
          </tr>
        `;
        dataTable.innerHTML += row;
      });
    })
    .catch(error => {
      console.error("Error fetching bookings:", error);
      document.getElementById("confirmedbookingdetails").innerHTML =
        `<tr><td colspan="14" style="color:red;">Error fetching your bookings</td></tr>`;
    });
}

//  Search Function
function searchBookings() {
  const input = document.getElementById("searchBar").value.toLowerCase();
  const rows = document.querySelectorAll("#confirmedbookingdetails tr");

  rows.forEach(row => {
    const rowText = row.textContent.toLowerCase();
    row.style.display = rowText.includes(input) ? "" : "none";
  });
}

//  Redirect to feedback page
function gotoFeedback(mechanicName, mechanicMobile) {
  localStorage.setItem("mechanicName", mechanicName);
  localStorage.setItem("mechanicMobile", mechanicMobile);
  window.location.href = "/feedback.html";
}
</script>
</body>
</html>
