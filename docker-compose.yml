version: '3.8'

services:
  booking-project:
    image: manojs2003/vehicle:booking-latest
    ports:
      - "8080:8080"
    networks:
      - vehicle_net

  image-classification:
    image: manojs2003/vehicle:image-latest
    ports:
      - "4000:4000"
    environment:
      - COHERE_API_KEY=your_real_cohere_api_key_here
    volumes:
      - D:\ideas\vehicle\image-classifier-main\image-classifier-main\damage_repair_guide.txt:/app/damage_repair_guide.txt
    networks:
      - vehicle_net

  sound-classification:
    image: manojs2003/vehicle:sound-latest
    ports:
      - "3000:3000"
    environment:
      - COHERE_API_KEY=your_real_cohere_api_key_here  # 👈 CRITICAL FIX: Add this line here!
    networks:
      - vehicle_net

networks:
  vehicle_net:
    driver: overlay