<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Doctor AI</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
            padding: 40px;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            margin: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 6px;
        }

        button:hover {
            background: #1e7e34;
        }

        #result {
            margin-top: 20px;
            text-align: left;
            background: #eef;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>🚗 Vehicle Doctor AI</h2>

    <input type="file" id="audiofile">

    <br>

    <button onclick="predict()">Analyze Audio</button>

    <div id="result"></div>

</div>

<script>
async function predict() {

    let file = document.getElementById("audiofile").files[0];

    if (!file) {
        alert("Upload audio first");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    let response = await fetch(
        "https://YOUR-RENDER-URL.onrender.com/predict-audio",
        {
            method: "POST",
            body: formData
        }
    );

    let data = await response.json();

    document.getElementById("result").innerHTML = `
        <h3>Prediction: ${data.prediction}</h3>
        <p><b>Confidence:</b> ${data.confidence.toFixed(2)}%</p>
        <p><b>Cause:</b> ${data.cause}</p>
        <p><b>Severity:</b> ${data.severity}</p>
        <pre>${data.rag_result}</pre>
    `;
}
</script>

</body>
</html>
